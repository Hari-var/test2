name: Artifact Failure Demo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: hello.txt

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Wrong Artifact
        uses: actions/download-artifact@v4
        with:
          name: artifact
